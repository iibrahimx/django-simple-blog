{% extends "base.html" %}

{% block title %}{{ post.title }} | Simple Blog{% endblock %}

{% block content %}
  <h1>{{ post.title }}</h1>

  <p>
    <small>by {{ post.author.username }} • {{ post.created_at|date:"M d, Y" }}</small>
  </p>

  <hr>

  <p>{{ post.content|linebreaks }}</p>

  <p><a href="{% url 'home' %}">← Back to home</a></p>
{% endblock %}
